<!DOCTYPE html>
<html class="light" lang="ko">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Idea Canvas</title>
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg'/%3E"/>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              primary: "#630ed4",
              surface: "#f8f9ff",
              "surface-container-lowest": "#ffffff",
              "surface-container-low": "#eff4ff",
              "surface-container-high": "#dce9ff",
              "outline-variant": "#ccc3d8",
              "on-surface": "#0b1c30",
              "on-surface-variant": "#4a4455",
              error: "#ba1a1a"
            },
            fontFamily: { sans: ["Inter", "sans-serif"] }
          }
        }
      };
    </script>
    <style>
      body { margin: 0; background: #f8f9ff; color: #0b1c30; font-family: Inter, sans-serif; }
      main { box-sizing: border-box; max-width: 72rem; margin: 0 auto; padding: 2rem 1.25rem; }
      button, a, input { font-family: inherit; }
      .fallback-card { border: 1px solid rgba(204, 195, 216, 0.6); border-radius: 0.5rem; background: #fff; box-shadow: 0 1px 2px rgba(11, 28, 48, 0.06); }
      #boards-list { display: grid; grid-template-columns: repeat(auto-fit, minmax(16rem, 1fr)); gap: 1rem; }
      #boards-list article { overflow: hidden; border: 1px solid rgba(204, 195, 216, 0.6); border-radius: 0.5rem; background: #fff; box-shadow: 0 1px 2px rgba(11, 28, 48, 0.06); }
      #boards-list article input { box-sizing: border-box; width: 100%; border: 0; border-bottom: 1px solid transparent; background: transparent; color: #0b1c30; font-size: 1.25rem; font-weight: 800; }
      #boards-list article input:focus { border-bottom-color: #630ed4; outline: none; }
    </style>
</head>
<body class="bg-surface text-on-surface font-sans min-h-screen">
    <main class="max-w-6xl mx-auto px-5 py-8">
        <header class="flex items-center justify-between gap-4 mb-8">
            <h1 class="text-4xl font-extrabold tracking-tight">Idea Canvas</h1>
            <div class="flex items-center gap-2">
                <div id="dashboard-auth-actions" class="flex items-center gap-2">
                    <button id="dashboard-open-login-btn" type="button" class="rounded-lg bg-surface-container-high px-4 py-2 text-sm font-bold text-on-surface hover:opacity-90">로그인</button>
                    <button id="dashboard-open-signup-btn" type="button" class="rounded-lg bg-primary px-4 py-2 text-sm font-bold text-white hover:opacity-90">교사 가입</button>
                </div>
                <div id="dashboard-auth-logged-in" class="hidden items-center gap-3">
                    <p id="dashboard-user-display" class="max-w-56 truncate text-sm font-bold"></p>
                    <button id="dashboard-logout-btn" type="button" class="rounded-lg border border-outline-variant px-3 py-2 text-xs font-bold">로그아웃</button>
                </div>
            </div>
        </header>

        <section id="dashboard-auth-card" class="hidden fallback-card ml-auto mb-8 max-w-md p-4">
            <div id="dashboard-auth-logged-out" class="hidden space-y-3">
                <div class="flex items-center justify-between gap-3">
                    <p class="text-sm font-extrabold">로그인</p>
                    <button id="dashboard-close-auth-btn" type="button" class="rounded-full p-1 text-on-surface-variant hover:bg-surface-container-low" title="닫기">
                        <span class="material-symbols-outlined text-lg">close</span>
                    </button>
                </div>
                <div class="grid grid-cols-1 gap-2">
                    <input id="dashboard-auth-email" type="email" placeholder="이메일" autocomplete="email" class="rounded-lg border-outline-variant text-sm"/>
                    <input id="dashboard-auth-password" type="password" placeholder="비밀번호" autocomplete="current-password" class="rounded-lg border-outline-variant text-sm"/>
                    <button id="dashboard-login-btn" type="button" class="rounded-lg bg-primary px-4 py-2.5 text-sm font-bold text-white">로그인</button>
                </div>
                <div class="flex items-center justify-between gap-3 border-t border-outline-variant/50 pt-3">
                    <button id="dashboard-reset-password-btn" type="button" class="text-xs font-bold text-on-surface-variant hover:text-primary">비밀번호 재설정</button>
                    <button id="dashboard-show-signup-btn" type="button" class="text-xs font-bold text-primary hover:opacity-80">교사 가입</button>
                </div>
            </div>

            <div id="dashboard-auth-signup" class="hidden space-y-3">
                <div class="flex items-center justify-between gap-3">
                    <p class="text-sm font-extrabold">교사 가입</p>
                    <button id="dashboard-show-login-btn" type="button" class="text-xs font-bold text-primary hover:opacity-80">로그인</button>
                </div>
                <div class="grid grid-cols-1 gap-2">
                    <input id="dashboard-auth-name" type="text" placeholder="이름" autocomplete="name" class="rounded-lg border-outline-variant text-sm"/>
                    <input id="dashboard-signup-email" type="email" placeholder="이메일" autocomplete="email" class="rounded-lg border-outline-variant text-sm"/>
                    <input id="dashboard-signup-password" type="password" placeholder="비밀번호" autocomplete="new-password" class="rounded-lg border-outline-variant text-sm"/>
                    <button id="dashboard-signup-btn" type="button" class="rounded-lg border border-primary px-4 py-2.5 text-sm font-bold text-primary">가입 신청</button>
                </div>
            </div>
        </section>

        <section id="landing-preview" class="pt-10">
            <div class="mx-auto grid max-w-4xl grid-cols-1 gap-4 sm:grid-cols-2 lg:grid-cols-4">
                <article class="fallback-card min-h-36 p-5">
                    <p class="text-sm font-extrabold">질문</p>
                </article>
                <article class="fallback-card min-h-36 p-5">
                    <p class="text-sm font-extrabold">아이디어</p>
                </article>
                <article class="fallback-card min-h-36 p-5">
                    <p class="text-sm font-extrabold">토론</p>
                </article>
                <article class="fallback-card min-h-36 p-5">
                    <p class="text-sm font-extrabold">정리</p>
                </article>
            </div>
        </section>

        <section id="dashboard-workspace" class="hidden">
            <nav class="flex gap-2 mb-6">
                <button id="boards-tab-btn" type="button" data-tab="boards" class="px-4 py-2 rounded-lg bg-primary text-white text-sm font-bold">보드</button>
                <button id="accounts-tab-btn" type="button" data-tab="accounts" class="hidden px-4 py-2 rounded-lg border border-outline-variant text-sm font-bold">계정 관리</button>
            </nav>

            <section id="boards-panel">
                <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-3 mb-6">
                    <div class="relative max-w-md w-full">
                        <label class="sr-only" for="board-search-input">보드 검색</label>
                        <span class="material-symbols-outlined pointer-events-none absolute left-3 top-1/2 -translate-y-1/2 text-xl text-on-surface-variant">search</span>
                        <input id="board-search-input" type="search" placeholder="보드 검색" class="w-full rounded-lg border-outline-variant bg-surface-container-lowest pl-10 pr-4 py-3 text-sm text-on-surface placeholder:text-on-surface-variant focus:border-primary focus:ring-primary"/>
                    </div>
                    <button id="create-board-btn" type="button" class="inline-flex items-center justify-center gap-2 px-5 py-3 rounded-lg bg-primary text-white text-sm font-bold hover:opacity-90 disabled:opacity-50 disabled:cursor-not-allowed">
                        <span class="material-symbols-outlined text-lg">add</span>
                        새 보드
                    </button>
                </div>
                <section id="boards-list" class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-4"></section>
                <p id="boards-status" class="text-sm text-on-surface-variant mt-5"></p>
            </section>

            <section id="accounts-panel" class="hidden space-y-5">
                <div class="fallback-card p-5">
                    <h2 class="text-lg font-extrabold mb-4">승인 대기 교사</h2>
                    <div id="pending-teachers-list" class="space-y-2 text-sm text-on-surface-variant"></div>
                </div>
                <div class="fallback-card p-5">
                    <h2 class="text-lg font-extrabold mb-4">교사 및 마스터</h2>
                    <div id="approved-teachers-list" class="space-y-2 text-sm text-on-surface-variant"></div>
                </div>
            </section>
        </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase_config.js"></script>
    <script src="js/supabase-client.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/boards.js"></script>
    <script src="js/boards-page.js"></script>
</body>
</html>
