<!DOCTYPE html>
<html class="light" lang="ko">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>IdeaCanvas | 보드 대시보드</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              primary: "#630ed4",
              surface: "#f8f9ff",
              "surface-container-lowest": "#ffffff",
              "surface-container-low": "#eff4ff",
              "surface-container-high": "#dce9ff",
              "outline-variant": "#ccc3d8",
              "on-surface": "#0b1c30",
              "on-surface-variant": "#4a4455",
              error: "#ba1a1a"
            },
            fontFamily: { sans: ["Inter", "sans-serif"] }
          }
        }
      };
    </script>
</head>
<body class="bg-surface text-on-surface font-sans min-h-screen">
    <main class="max-w-5xl mx-auto px-5 py-8">
        <header class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-4 mb-8">
            <div>
                <p class="text-xs font-semibold text-primary uppercase tracking-wide">IdeaCanvas</p>
                <h1 class="text-3xl font-extrabold tracking-tight">보드 대시보드</h1>
                <p id="boards-connection-detail" class="text-sm text-on-surface-variant mt-2">Supabase 연결을 확인하는 중입니다.</p>
            </div>
            <button id="create-board-btn" type="button" class="inline-flex items-center justify-center gap-2 px-5 py-3 rounded-xl bg-primary text-white text-sm font-bold hover:opacity-90 disabled:opacity-50 disabled:cursor-not-allowed">
                <span class="material-symbols-outlined text-lg">add</span>
                새 보드
            </button>
        </header>

        <section id="boards-list" class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-4"></section>
        <p id="boards-status" class="text-sm text-on-surface-variant mt-5"></p>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase_config.js"></script>
    <script src="js/supabase-client.js"></script>
    <script src="js/boards.js"></script>
    <script src="js/boards-page.js"></script>
</body>
</html>
